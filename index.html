```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Shop - Fun Stickers for Everyone!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.2em;
            color: #666;
        }

        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .sticker-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .sticker-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .sticker-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .sticker-card:hover::before {
            left: 100%;
        }

        .sticker-emoji {
            font-size: 6em;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.3));
        }

        .sticker-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .sticker-price {
            font-size: 1.3em;
            color: #e74c3c;
            font-weight: bold;
        }

        .add-to-cart {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(238, 90, 36, 0.4);
        }

        .add-to-cart:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(238, 90, 36, 0.6);
        }

        .cart {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2ecc71;
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
            transition: all 0.3s ease;
        }

        .cart:hover {
            background: #27ae60;
            transform: scale(1.1);
        }

        .cart-count {
            background: #e74c3c;
            border-radius: 50%;
            padding: 4px 8px;
            font-size: 0.9em;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            .sticker-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
            }
            
            .header h1 {
                font-size: 2.2em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎉 Sticker Shop 🎉</h1>
        <p>Collect the coolest stickers for your messages!</p>
    </div>

    <div class="sticker-grid">
        <div class="sticker-card" data-name="Rocket" data-price="1.99">
            <span class="sticker-emoji">🚀</span>
            <div class="sticker-name">Rocket Blast</div>
            <div class="sticker-price">$1.99</div>
            <button class="add-to-cart" onclick="addToCart('Rocket Blast', 1.99)">Add to Cart</button>
        </div>

        <div class="sticker-card" data-name="Heart Eyes" data-price="0.99">
            <span class="sticker-emoji">😍</span>
            <div class="sticker-name">Heart Eyes</div>
            <div class="sticker-price">$0.99</div>
            <button class="add-to-cart" onclick="addToCart('Heart Eyes', 0.99)">Add to Cart</button>
        </div>

        <div class="sticker-card" data-name="Dancing" data-price="1.49">
            <span class="sticker-emoji">💃</span>
            <div class="sticker-name">Dance Party</div>
            <div class="sticker-price">$1.49</div>
            <button class="add-to-cart" onclick="addToCart('Dance Party', 1.49)">Add to Cart</button>
        </div>

        <div class="sticker-card" data-name="Pizza" data-price="1.29">
            <span class="sticker-emoji">🍕</span>
            <div class="sticker-name">Pizza Time</div>
            <div class="sticker-price">$1.29</div>
            <button class="add-to-cart" onclick="addToCart('Pizza Time', 1.29)">Add to Cart</button>
        </div>

        <div class="sticker-card" data-name="Unicorn" data-price="2.49">
            <span class="sticker-emoji">🦄</span>
            <div class="sticker-name">Magic Unicorn</div>
            <div class="sticker-price">$2.49</div>
            <button class="add-to-cart" onclick="addToCart('Magic Unicorn', 2.49)">Add to Cart</button>
        </div>

        <div class="sticker-card" data-name="Fire" data-price="0.79">
            <span class="sticker-emoji">🔥</span>
            <div class="sticker-name">On Fire!</div>
            <div class="sticker-price">$0.79</div>
            <button class="add-to-cart" onclick="addToCart('On Fire!', 0.79)">Add to Cart</button>
        </div>

        <div class="sticker-card" data-name="Robot" data-price="1.79">
            <span class="sticker-emoji">🤖</span>
            <div class="sticker-name">Cool Robot</div>
            <div class="sticker-price">$1.79</div>
            <button class="add-to-cart" onclick="addToCart('Cool Robot', 1.79)">Add to Cart</button>
        </div>

        <div class="sticker-card" data-name="Rainbow" data-price="1.99">
            <span class="sticker-emoji">🌈</span>
            <div class="sticker-name">Rainbow Magic</div>
            <div class="sticker-price">$1.99</div>
            <button class="add-to-cart" onclick="addToCart('Rainbow Magic', 1.99)">Add to Cart</button>
        </div>
    </div>

    <div class="cart" onclick="showCart()">
        🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </div>

    <script>
        let cart = [];
        let cartCount = 0;

        function addToCart(name, price) {
            cart.push({ name, price });
            cartCount++;
            document.getElementById('cartCount').textContent = cartCount;
            
            // Add animation
            const button = event.target;
            button.textContent = 'Added! 🎉';
            button.style.background = 'linear-gradient(45deg, #2ecc71, #27ae60)';
            
            setTimeout(() => {
                button.textContent = 'Add to Cart';
                button.style.background = 'linear-gradient(45deg, #ff6b6b, #ee5a24)';
            }, 1500);
        }

        function showCart() {
            if (cart.length === 0) {
                alert('Your cart is empty! 😅');
                return;
            }
            
            let total = 0;
            let cartItems = cart.map((item, index) => {
                total += item.price;
                return `${index + 1}. ${item.name} - $${item.price.toFixed(2)}`;
            }).join('\n');
            
            alert(`🛒 Your Cart:\n\n${cartItems}\n\nTotal: $${total.toFixed(2)}`);
        }

        // Add click animation to cards
        document.querySelectorAll('.sticker-card').forEach(card => {
            card.addEventListener('click', function(e) {
                if (!e.target.classList.contains('add-to-cart')) {
                    // Bounce animation
                    this.style.animation = 'none';
                    setTimeout(() => {
                        this.style.animation = 'bounce 0.6s';
                    }, 10);
                }
            });
        });
    </script>

    <style>
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-10px); }
        }
    </style>
</body>
</html>
