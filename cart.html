<!DOCTYPE html>
<html>
<head>
<title>Cart - Stickora</title>
<style>
body{background:#0c0c0c;color:white;text-align:center;font-family:Poppins;}
button{padding:10px 20px;border:none;background:#ff4d6d;color:white;border-radius:20px;}
</style>
</head>

<body>

<h1>Your Cart</h1>

<div id="cart"></div>

<button onclick="checkout()">Proceed to Checkout</button>

<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let total=0;
let text="";

cart.forEach((item,i)=>{
total+=item.price;
text+=`<p>${item.name} - $${item.price}</p>`;
});

text+=`<h2>Total: $${total}</h2>`;
document.getElementById("cart").innerHTML=text;

function checkout(){
window.location.href="checkout.html";
}
</script>

</body>
</html>
